name: Test

on:
  pull_request:
    branches:
      - main
      - develop
  push:
    branches:
      - develop

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      mongodb:
        image: mongo:7-alpine
        env:
          MONGO_INITDB_ROOT_USERNAME: admin
          MONGO_INITDB_ROOT_PASSWORD: admin123
          MONGO_INITDB_DATABASE: job_test_db
        options: >-
          --health-cmd mongosh
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 27017:27017

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          DATABASE_URL: mongodb://admin:admin123@localhost:27017/job_test_db?authSource=admin
          NEXTAUTH_URL: http://localhost:3000
          NEXTAUTH_SECRET: test-secret-key

      - name: Run tests
        run: npm test --if-present
        env:
          DATABASE_URL: mongodb://admin:admin123@localhost:27017/job_test_db?authSource=admin
          NODE_ENV: test

      - name: Check TypeScript
        run: npx tsc --noEmit
